<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hazel Study Room</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/session.css" />
</head>
<body data-theme="dark">
  <div class="app-shell">
    <main class="main-area">
      <aside class="sidebar panel">
        <div class="brand">
          <div class="brand-mark">H</div>
          <div>
            <h1>Hazel Study Room</h1>
            <p>학습형 RP 플레이 룸</p>
          </div>
        </div>

        <div class="toolbar-block">
          <button id="newSessionBtn" class="primary-btn">+ 새 세션</button>
        </div>

        <div class="toolbar-block">
          <label class="small-label" for="sessionTitleInput">세션 제목</label>
          <input id="sessionTitleInput" class="text-input" placeholder="예: 민법 - 무효와 취소" />

          <label class="small-label" for="sessionSubjectInput">과목 / 태그</label>
          <input id="sessionSubjectInput" class="text-input" placeholder="예: 민법, 영어, 수학" />
        </div>

        <div class="toolbar-block">
          <div class="section-head">
            <h2>세션 목록</h2>
          </div>
          <div id="sessionList" class="session-list"></div>
        </div>

        <section class="toolbar-block">
          <div class="section-head">
            <h2>계정</h2>
          </div>

          <div id="authStatus" class="hint-text">로그아웃 상태</div>

          <label class="small-label" for="authEmail">이메일</label>
          <input id="authEmail" class="text-input" type="email" placeholder="you@example.com" />

          <label class="small-label" for="authPassword">비밀번호</label>
          <input id="authPassword" class="text-input" type="password" placeholder="비밀번호" />

          <div class="composer-actions">
            <button id="signUpBtn" class="ghost-btn">회원가입</button>
            <button id="signInBtn" class="primary-btn">로그인</button>
            <button id="signOutBtn" class="ghost-btn">로그아웃</button>
          </div>
        </section>
      </aside>

      <section class="log-panel panel">
        <div class="panel-head sticky-head">
          <div>
            <h2 id="currentSessionTitle">세션을 선택해 주세요</h2>
            <p id="currentSessionMeta">아직 세션이 없습니다.</p>
          </div>

          <div class="theme-picker">
            <button class="theme-chip" data-theme-name="pink" title="Pink">🌸</button>
            <button class="theme-chip" data-theme-name="green" title="Green">🌿</button>
            <button class="theme-chip" data-theme-name="blue" title="Blue">🔵</button>
            <button class="theme-chip" data-theme-name="dark" title="Dark">🖤</button>
            <button class="theme-chip" data-theme-name="light" title="Light">🤍</button>
            <button class="theme-chip" data-theme-name="yellow" title="Yellow">💛</button>
          </div>
        </div>

        <div id="tabBar" class="tab-bar"></div>
        <div id="logContainer" class="log-container"></div>

        <div class="composer">
          <div class="composer-row">
            <div class="field">
              <label class="small-label" for="logType">로그 타입</label>
              <select id="logType" class="select-input">
                <option value="dialogue">답멘</option>
                <option value="system">시스템</option>
                <option value="note">메모</option>
              </select>
            </div>

            <div class="field">
              <label class="small-label" for="speakerSelect">화자</label>
              <select id="speakerSelect" class="select-input"></select>
            </div>
          </div>

          <div class="composer-row">
            <textarea id="logInput" class="textarea-input" placeholder="로그를 입력해 주세요."></textarea>
          </div>

          <div class="composer-actions">
            <button id="addLogBtn" class="primary-btn">로그 추가</button>
            <button id="clearInputBtn" class="ghost-btn">지우기</button>
          </div>
        </div>
      </section>

      <aside class="utility-panel panel">
        <div class="panel-head">
          <h2>도구</h2>
          <p>세션용 보조 기능</p>
        </div>

        <section class="utility-section">
          <div class="section-head">
            <h3>현재 목표</h3>
          </div>
          <textarea id="goalInput" class="textarea-input small" placeholder="이번 세션의 학습 목표를 적어 주세요."></textarea>
          <button id="saveGoalBtn" class="ghost-btn full">목표 저장</button>
        </section>

        <section class="utility-section">
          <div class="section-head">
            <h3>타이머</h3>
          </div>
          <div id="timerDisplay" class="timer-display">25:00</div>
          <div class="timer-controls">
            <button id="startTimerBtn" class="primary-btn">시작</button>
            <button id="pauseTimerBtn" class="ghost-btn">일시정지</button>
            <button id="resetTimerBtn" class="ghost-btn">초기화</button>
          </div>
          <div class="timer-presets">
            <button class="ghost-btn preset-btn" data-seconds="1500">25분</button>
            <button class="ghost-btn preset-btn" data-seconds="1800">30분</button>
            <button class="ghost-btn preset-btn" data-seconds="300">5분</button>
          </div>
        </section>

        <section class="utility-section">
          <div class="section-head">
            <h3>CoC 판정</h3>
          </div>

          <div class="field">
            <label class="small-label" for="diceCharacter">캐릭터</label>
            <select id="diceCharacter" class="select-input"></select>
          </div>

          <div class="field">
            <label class="small-label" for="diceSkill">기능</label>
            <select id="diceSkill" class="select-input"></select>
          </div>

          <div class="field">
            <label class="small-label" for="diceTarget">기능치</label>
            <input id="diceTarget" class="text-input" type="number" min="1" max="99" />
          </div>

          <button id="rollDiceBtn" class="primary-btn full">🎲 d100 굴리기</button>
          <p class="hint-text">기준: 성공 / 어려운 성공 / 극단적 성공 / 실패 / 펌블</p>
        </section>

        <section class="utility-section">
          <div class="section-head">
            <h3>캐릭터 시트</h3>
          </div>

          <div class="field">
            <label class="small-label" for="characterSelect">캐릭터 선택</label>
            <select id="characterSelect" class="select-input"></select>
          </div>

          <div class="character-card" id="characterCard">
            <div class="character-top">
              <div class="avatar-wrap">
                <img id="characterAvatarPreview" class="avatar-preview" alt="avatar" />
                <div class="avatar-fallback" id="avatarFallback">?</div>
              </div>

              <div class="character-basic">
                <input id="characterNameInput" class="text-input" placeholder="탐사자 이름" />
                <input id="characterColorInput" class="text-input" type="color" value="#7aa2ff" />
              </div>
            </div>

            <div class="field">
              <label class="small-label" for="playerInput">플레이어</label>
              <input id="playerInput" class="text-input" placeholder="플레이어 이름" />
            </div>

            <div class="field">
              <label class="small-label" for="jobInput">직업</label>
              <input id="jobInput" class="text-input" placeholder="직업" />
            </div>

            <div class="field">
              <label class="small-label" for="characterDescInput">설명</label>
              <textarea id="characterDescInput" class="textarea-input small" placeholder="탐사자 설명"></textarea>
            </div>

            <div class="field">
              <label class="small-label" for="avatarInput">프사 업로드</label>
              <input id="avatarInput" type="file" accept="image/*" class="file-input" />
            </div>

            <div class="section-head">
              <h3>특성치</h3>
            </div>
            <div class="stats-grid">
              <label>STR <input data-stat="str" class="stat-input" type="number" min="0" max="99"></label>
              <label>CON <input data-stat="con" class="stat-input" type="number" min="0" max="99"></label>
              <label>SIZ <input data-stat="siz" class="stat-input" type="number" min="0" max="99"></label>
              <label>DEX <input data-stat="dex" class="stat-input" type="number" min="0" max="99"></label>
              <label>APP <input data-stat="app" class="stat-input" type="number" min="0" max="99"></label>
              <label>INT <input data-stat="int" class="stat-input" type="number" min="0" max="99"></label>
              <label>POW <input data-stat="pow" class="stat-input" type="number" min="0" max="99"></label>
              <label>EDU <input data-stat="edu" class="stat-input" type="number" min="0" max="99"></label>
            </div>

            <div class="section-head" style="margin-top:12px;">
              <h3>파생치</h3>
            </div>
            <div class="stats-grid">
              <label>HP <input id="hpInput" class="stat-input" type="number" min="0"></label>
              <label>MP <input id="mpInput" class="stat-input" type="number" min="0"></label>
              <label>SAN <input id="sanInput" class="stat-input" type="number" min="0" max="99"></label>
              <label>LUCK <input id="luckInput" class="stat-input" type="number" min="0" max="99"></label>
            </div>

            <div class="section-head" style="margin-top:12px;">
              <h3>기능치</h3>
            </div>
            <div class="stats-grid">
              <label>관찰력 <input id="skillSpotHiddenInput" class="stat-input" type="number" min="0" max="99"></label>
              <label>듣기 <input id="skillListenInput" class="stat-input" type="number" min="0" max="99"></label>
              <label>심리학 <input id="skillPsychologyInput" class="stat-input" type="number" min="0" max="99"></label>
              <label>설득 <input id="skillPersuadeInput" class="stat-input" type="number" min="0" max="99"></label>
              <label>법률 <input id="skillLawInput" class="stat-input" type="number" min="0" max="99"></label>
              <label>자료조사 <input id="skillLibraryUseInput" class="stat-input" type="number" min="0" max="99"></label>
            </div>

            <div class="composer-actions" style="margin-top:12px;">
              <button id="saveCharacterBtn" class="primary-btn">캐릭터 저장</button>
              <button id="addCharacterBtn" class="ghost-btn">+ 캐릭터 추가</button>
              <button id="deleteCharacterBtn" class="ghost-btn">캐릭터 삭제</button>
            </div>
          </div>
        </section>

        <section class="utility-section">
          <div class="section-head">
            <h3>백업</h3>
          </div>
          <button id="exportMarkdownBtn" class="ghost-btn full">대화 내역 백업 (.md)</button>
        </section>
      </aside>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/session.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/dice.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
